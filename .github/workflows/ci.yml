name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (cargo test + wasm build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + wasm32v1-none)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --workspace --locked
      - name: Build contract wasm (release)
        run: cargo build --workspace --target wasm32v1-none --release --locked

  prover:
    name: Prover (npm test — encoders, packet, CLI logic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prover
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      # prover is a bun-workspace member (@ctd/sdk is `workspace:*`), which npm
      # can't resolve — install with bun; the tests still run on Node via `npm test`.
      - run: bun install
      - run: npm test

  dashboard:
    name: Dashboard (bun lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      - run: bun run build
